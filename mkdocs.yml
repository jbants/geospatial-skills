site_name: geospatial-skills
site_url: https://isaac.earth/geospatial-skills/
site_description: Installable geospatial skills for AI coding agents
repo_url: https://github.com/isaaccorley/geospatial-skills
repo_name: isaaccorley/geospatial-skills
strict: true

theme:
  name: material
  custom_dir: overrides
  logo: null
  favicon: null
  palette:
    - scheme: slate
      primary: black
      accent: lime
  features:
    - navigation.sections
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/install.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Skills:
      - GDAL: skills/gdal.md
      - GeoParquet Validation: skills/geoparquet-validation.md
      - GeoZarr: skills/geozarr.md
      - Tessera: skills/tessera.md
      - Geospatial Viewers: skills/geospatial-viewers.md
      - Geospatial Frontend: skills/geospatial-frontend.md
